<head>
<meta charset="UTF-8">
<title>Todo App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Todo App</h1>

<div class="input-area">
<input type="text" id="taskInput" placeholder="Add new task...">
<button onclick="addTask()">Add</button>
</div>

<div class="filters">
<button onclick="filterTasks('all')">All</button>
<button onclick="filterTasks('active')">Active</button>
<button onclick="filterTasks('completed')">Completed</button>
</div>

<ul id="taskList"></ul>

<p id="taskCounter"></p>

</div>

<div class="info-btn" onclick="toggleInfo()">i</div>
<div id="infoModal" class="modal">
<div class="modal-content">


<h2>Про застосунок</h2>

<p><b>Todo List App</b></p>
<p>Додаток для управління задачами</p>

<br>

<p>Розроблено для практики з ТРПЗ,<br>
студентом 34 групи 121 спеціальності.</p>

<br>

<p>© 2026 Зубарев Іван</p>
<button class="ok-btn" onclick="toggleInfo()">OK</button>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
